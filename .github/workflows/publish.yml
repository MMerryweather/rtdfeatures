name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build
        run: python -m build

      - name: Check
        run: twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*

  validate_wheel:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Validate wheel in clean environment
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install --upgrade pip
          pip install dist/*.whl
          VALIDATION_TMPDIR="$(mktemp -d)"
          cd "${VALIDATION_TMPDIR}"
          python -c "import importlib.metadata, pathlib, rtdfeatures; module_path = pathlib.Path(rtdfeatures.__file__).resolve(); assert 'site-packages' in module_path.parts, f'Expected installed package in site-packages, got: {module_path}'; assert importlib.metadata.version('rtdfeatures') == rtdfeatures.__version__, 'Version mismatch between metadata and package'; print(rtdfeatures.__version__); print(module_path)"

  validate_sdist:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Validate sdist in clean environment
        run: |
          python -m venv .venv-sdist
          . .venv-sdist/bin/activate
          python -m pip install --upgrade pip
          pip install dist/*.tar.gz
          VALIDATION_TMPDIR="$(mktemp -d)"
          cd "${VALIDATION_TMPDIR}"
          python -c "import importlib.metadata, pathlib, rtdfeatures; module_path = pathlib.Path(rtdfeatures.__file__).resolve(); assert 'site-packages' in module_path.parts, f'Expected installed package in site-packages, got: {module_path}'; assert importlib.metadata.version('rtdfeatures') == rtdfeatures.__version__, 'Version mismatch between metadata and package'; print(rtdfeatures.__version__); print(module_path)"

  publish:
    runs-on: ubuntu-latest
    needs: [validate_wheel, validate_sdist]
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
