name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate release tag matches project version
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          tag = os.environ.get("GITHUB_REF_NAME", "")
          text = Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version = "([^"]+)"$', text, re.MULTILINE)
          if match is None:
              raise SystemExit("Could not find project version in pyproject.toml")

          version = match.group(1)
          expected_tag = f"v{version}"
          if tag != expected_tag:
              raise SystemExit(
                  f"Release tag {tag!r} does not match pyproject version {version!r}; "
                  f"expected {expected_tag!r}"
              )

          print(f"Release tag {tag} matches pyproject version {version}")
          PY

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build
        run: python -m build

      - name: Check
        run: twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  validate_wheel:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Validate wheel in clean environment
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install --upgrade pip
          pip install dist/*.whl
          VALIDATION_TMPDIR="$(mktemp -d)"
          cd "${VALIDATION_TMPDIR}"
          python -c "import importlib.metadata, pathlib, rtdfeatures; module_path = pathlib.Path(rtdfeatures.__file__).resolve(); assert 'site-packages' in module_path.parts, f'Expected installed package in site-packages, got: {module_path}'; assert importlib.metadata.version('rtdfeatures') == rtdfeatures.__version__, 'Version mismatch between metadata and package'; print(rtdfeatures.__version__); print(module_path)"

  validate_sdist:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Validate sdist in clean environment
        run: |
          python -m venv .venv-sdist
          . .venv-sdist/bin/activate
          python -m pip install --upgrade pip
          pip install dist/*.tar.gz
          VALIDATION_TMPDIR="$(mktemp -d)"
          cd "${VALIDATION_TMPDIR}"
          python -c "import importlib.metadata, pathlib, rtdfeatures; module_path = pathlib.Path(rtdfeatures.__file__).resolve(); assert 'site-packages' in module_path.parts, f'Expected installed package in site-packages, got: {module_path}'; assert importlib.metadata.version('rtdfeatures') == rtdfeatures.__version__, 'Version mismatch between metadata and package'; print(rtdfeatures.__version__); print(module_path)"

  publish:
    runs-on: ubuntu-latest
    needs: [validate_wheel, validate_sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/rtdfeatures
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
